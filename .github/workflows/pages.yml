name: Build and Deploy to GH Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write # Надаємо право запису, щоб робот міг створити і оновити гілку gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: quiz-test-react-app

      - name: Build project
        run: npm run build
        working-directory: quiz-test-react-app

      # Ось цей крок автоматично створить гілку gh-pages і завантажить туди готовий сайт
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: quiz-test-react-app/dist # Вказуємо папку з готовим білдом
          branch: gh-pages # Гілка куди деплоїти
